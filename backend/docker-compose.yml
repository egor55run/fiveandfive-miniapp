services:
  db:
    image: postgres:16-alpine
    container_name: fiveandfive-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fiveandfive
      POSTGRES_PASSWORD: fiveandfive
      POSTGRES_DB: fiveandfive
    ports:
      - "5432:5432"
    volumes:
      - fiveandfive-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiveandfive -d fiveandfive"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fiveandfive-db-data:
